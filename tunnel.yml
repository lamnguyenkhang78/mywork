name: Rathole Proxy Server
on: [workflow_dispatch] # Bấm nút thủ công để chạy

jobs:
  run-rathole:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Install Rathole
        run: |
          wget https://github.com/rapiz1/rathole/releases/download/v0.5.0/rathole-x86_64-unknown-linux-gnu.zip
          unzip rathole-x86_64-unknown-linux-gnu.zip
          chmod +x rathole

      - name: Get Server IP
        run: |
          echo "IP Server cua ban la:"
          curl -s ifconfig.me
          echo -e "\n-----------------------------------"

      - name: Start Rathole Server
        run: ./rathole -s server.toml
