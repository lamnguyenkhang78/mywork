name: GHA VPS Fixed
on: workflow_dispatch

jobs:
  vps:
    runs-on: ubuntu-latest
    steps:
      - name: Setup SSH & Tunnel
        run: |
          # 1. Cấu hình SSH Server
          sudo systemctl start ssh
          echo "runner:123" | sudo chpasswd
          sudo sed -i 's/#PasswordAuthentication yes/PasswordAuthentication yes/g' /etc/ssh/sshd_config
          sudo systemctl restart ssh

          # 2. Khởi tạo Tunnel (Dùng tên khangvps789987)
          echo "-----------------------------------------------------"
          echo "DANG KET NOI DEN SERVEO..."
          echo "-----------------------------------------------------"
          
          # Lệnh này sẽ chạy và giữ kết nối luôn (không dùng -f để bạn xem log)
          ssh -o StrictHostKeyChecking=no -o ServerAliveInterval=60 -R khangvps789987:80:localhost:22 serveo.net
