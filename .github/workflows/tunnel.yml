name: GHA_Port_Forwarder
on: workflow_dispatch

jobs:
  forward:
    runs-on: ubuntu-latest
    steps:
      - name: Setup SSH Forwarding
        run: |
          # Chọc thủng Port qua Serveo
          # Lệnh này nói: "Mọi thứ gửi đến congdongbanthan.serveo.net:2206 
          # hãy gửi về máy của Khang"
          ssh -o StrictHostKeyChecking=no -R congdongbanthan:2206:localhost:2206 serveo.net &
          
      - name: Keep Alive & Update DuckDNS
        run: |
          # Cập nhật IP của GHA lên DuckDNS để bạn quản lý
          curl -s "https://www.duckdns.org/update?domains=congdongbanthan&token=8fe3c35e-d779-45d3-8851-22e4c6fefaf1&ip="
          echo "Tunnel đang chạy tại: congdongbanthan.serveo.net:2206"
          sleep 21600 # Giữ máy ảo chạy 6 tiếng
