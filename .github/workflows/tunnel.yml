name: Boringproxy Fixed Tunnel
on: [workflow_dispatch]

jobs:
  server:
    runs-on: ubuntu-latest
    steps:
      - name: Update DuckDNS
        run: |
          curl "https://www.duckdns.org/update?domains=congdongbanthan&token=8fe3c35e-d779-45d3-8851-22e4c6fefaf1&ip="

      - name: Setup Boringproxy
        run: |
          wget https://github.com/boringproxy/boringproxy/releases/download/v0.8.0/boringproxy-linux-x86_64
          chmod +x boringproxy-linux-x86_64
          # Chạy server với password là lamnguyenkhang2206
          # Server này sẽ nhận kết nối ngược từ máy bạn ra (Outbound) nên không bị chặn
          ./boringproxy-linux-x86_64 server -admin-config-dir ./conf -cert-domain congdongbanthan.duckdns.org &
          
          echo "Đang đợi máy chủ sẵn sàng..."
          sleep 10
          echo "Máy chủ đã online tại congdongbanthan.duckdns.org"
          sleep 6h
